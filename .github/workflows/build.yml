name: Build plugins (Windows / Linux / macOS)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
          - os: ubuntu-latest
            name: Linux
          - os: macos-latest
            name: macOS

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux audio/GUI dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-dev ladspa-sdk \
            libcurl4-openssl-dev libfreetype6-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev pkg-config

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build (Release)
        run: cmake --build build --config Release --parallel

      - name: Package artefacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $out = "package/Glitchwave567-Windows"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Copy-Item "build/Glitchwave567_artefacts/Release/VST3/Glitchwave 567.vst3" -Destination "$out/Glitchwave 567.vst3" -Recurse
          Copy-Item "build/Glitchwave567_artefacts/Release/Standalone/Glitchwave 567.exe" -Destination "$out/Glitchwave 567.exe"
          Compress-Archive -Path "$out/*" -DestinationPath "Glitchwave567-Windows.zip"

      - name: Package artefacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          out="package/Glitchwave567-Linux"
          mkdir -p "$out"
          cp -r "build/Glitchwave567_artefacts/Release/VST3/Glitchwave 567.vst3" "$out/"
          cp "build/Glitchwave567_artefacts/Release/Standalone/Glitchwave 567" "$out/"
          cd package && zip -r "../Glitchwave567-Linux.zip" "Glitchwave567-Linux"

      - name: Package artefacts (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          out="package/Glitchwave567-macOS"
          mkdir -p "$out"
          cp -r "build/Glitchwave567_artefacts/Release/VST3/Glitchwave 567.vst3" "$out/"
          cp -r "build/Glitchwave567_artefacts/Release/AU/Glitchwave 567.component" "$out/"
          cp -r "build/Glitchwave567_artefacts/Release/Standalone/Glitchwave 567.app" "$out/"
          cd package && zip -r "../Glitchwave567-macOS.zip" "Glitchwave567-macOS"

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: Glitchwave567-${{ matrix.name }}
          path: Glitchwave567-${{ matrix.name }}.zip
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
